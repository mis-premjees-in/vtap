name: vtap
environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  crypto: ^3.0.3
  get: ^4.6.6
  dio: ^5.4.0
  flutter_animate: ^4.5.0
  flutter_slidable: ^3.1.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  lottie: ^3.1.0
  get_storage: ^2.1.1

  # UI
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  animations: ^2.0.11
  # lottie: ^3.1.2
  flutter_staggered_animations: ^1.1.1

  # LOCATION
  # geolocator: ^12.0.0
  geocoding: ^3.0.0

  # IMAGE
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # NOTIFICATION
  flutter_local_notifications: ^17.2.2

  # CONNECTIVITY
  connectivity_plus: ^6.0.5
  timezone: ^0.9.2 # Time-based notifications ke liye zaroori hai
  flutter_background_service: ^5.1.0
  #workmanager: ^0.5.2

  # UTIL
  intl: 
  path_provider: ^2.1.5
  url_launcher: 
  firebase_core: 
  firebase_auth:
  firebase_messaging: 
  geofence_service: 
  google_sign_in: ^6.2.1
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/vtap_logo.png"

flutter_native_splash:
  color: "#121212"
  image: "assets/images/vtap_logo.png"
  android_12:
    image: "assets/images/vtap_logo.png"
    color: "#121212"